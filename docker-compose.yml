services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vidsaas
      POSTGRES_USER: vidsaas
      POSTGRES_PASSWORD: vidsaas_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidsaas -d vidsaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npm run start"

volumes:
  pgdata:
